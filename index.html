    <link rel="stylesheet" href="/splash.css?v=4" />
  </head>
  <body>
    <!-- Premium Animated Splash Screen (Only) -->
    <div id="splash-screen">
      <div class="splash-logo-container">
        <img src="/icon.png?v=4" alt="Milvexa Logo" class="splash-logo" />
      </div>
      <h1 class="splash-title">Milvexa</h1>
      <p class="splash-tagline">Cattle Farm Management</p>
      <div class="loader"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Global splash management coordinated with React app loading + update checks
      window.hideSplash = () => {
        const splash = document.getElementById('splash-screen');
        if (splash && !splash.classList.contains('hide-splash')) {
          splash.classList.add('hide-splash');
          document.body.style.overflow = 'auto';
        }
      };

      // Detect domains synchronously to manage splash screen display
      (function() {
        const hostname = window.location.hostname;
        const pathname = window.location.pathname;
        const isAdmin = hostname.includes('admin.milvexasolutions.in') || hostname.includes('admin.localhost') || pathname.startsWith('/admin');
        const isApp = (hostname.includes('app.milvexasolutions.in') || hostname.includes('app.localhost') || pathname.startsWith('/app') || hostname === 'localhost' || hostname === '127.0.0.1' || !!window.Capacitor) && !hostname.includes('www.milvexasolutions.in') && hostname !== 'milvexasolutions.in';

        if (!isAdmin && !isApp) {
          // Immediately hide splash screen on the corporate website
          document.write('<style>#splash-screen { display: none !important; }</style>');
          window.hideSplash();
        } else {
          // Robust immediate fallback: hide splash after 4 seconds regardless of load event (prevents hanging)
          setTimeout(() => {
            window.hideSplash();
          }, 4000);
        }
      })();

      // Disable Pinch-to-Zoom
      document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      document.addEventListener('gesturestart', (e) => {
        e.preventDefault();
      });

      // Disable Ctrl+Wheel zoom
      document.addEventListener('wheel', (e) => {
        if (e.ctrlKey) {
          e.preventDefault();
        }
      }, { passive: false });

      // Disable Ctrl+Plus/Minus/Zero
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '0' || e.keyCode === 187 || e.keyCode === 189 || e.keyCode === 48)) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
